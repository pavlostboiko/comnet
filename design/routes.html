<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARSH — Маршрути</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f8fafc; --surface:#fff; --border:#e2e8f0; --border-light:#f1f5f9;
    --text:#0f172a; --text-mid:#475569; --text-light:#94a3b8;
    --accent:#475569; --accent-light:#e2e8f0; --accent-dark:#334155;
    --accent-soft:rgba(71,85,105,0.08); --accent-ring:rgba(71,85,105,0.18);
    --row-hover:#f1f5f9;
    --amber:#f59e0b; --amber-bg:#fffbeb; --amber-border:#fde68a; --amber-text:#92400e;
    --red:#ef4444; --red-bg:#fef2f2;
    --shadow:0 1px 3px rgba(15,23,42,0.06),0 0 0 1px rgba(15,23,42,0.04);
    --shadow-xl:0 20px 40px rgba(15,23,42,0.14),0 0 0 1px rgba(15,23,42,0.05);
    --radius:4px; --radius-sm:3px; --radius-pill:6px;
    --row-pad-y:11px; --cell-pad-x:12px;
    --font-body:14.5px; --font-mono:12.5px; --font-header:11px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* TOPBAR */
  .topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;flex-shrink:0}
  .logo-area{display:flex;align-items:center;gap:9px;margin-right:32px}
  .logo-sq{width:28px;height:28px;background:var(--accent);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}
  .logo-text{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
  .nav-links{display:flex;align-items:stretch;height:100%}
  .nav-link{display:flex;align-items:center;gap:6px;padding:0 14px;font-size:14px;font-weight:500;color:var(--text-mid);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-decoration:none}
  .nav-link:hover{color:var(--text)}
  .nav-link.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .nav-link .cnt{font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500;background:var(--accent-light);color:var(--accent);padding:1px 6px;border-radius:var(--radius-sm)}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .tb-search{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;width:240px;transition:all .2s}
  .tb-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring);background:var(--surface);width:320px}
  .tb-search input{border:none;background:transparent;font-family:inherit;font-size:13.5px;color:var(--text);outline:none;width:100%}
  .tb-search input::placeholder{color:var(--text-light)}
  .tb-search .clear-x{width:16px;height:16px;border-radius:50%;background:var(--text-light);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0;flex-shrink:0}
  .tb-search .clear-x:hover{background:var(--text-mid)}
  .tb-search.has-value .clear-x{display:flex}
  .btn-primary{display:flex;align-items:center;gap:5px;padding:8px 14px;background:var(--accent);border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:13.5px;font-weight:600;color:#fff;cursor:pointer;transition:all .15s}
  .btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:0 4px 12px var(--accent-ring)}
  .user-pill{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 5px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-pill);cursor:pointer}
  .user-dot{width:24px;height:24px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:#fff}
  .user-pill span{font-size:13px;font-weight:500;color:var(--text-mid)}

  /* CONTENT */
  .content-scroll{flex:1;overflow-y:auto;padding:20px 24px}
  .content-scroll::-webkit-scrollbar{width:6px}
  .content-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* TILE */
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:tileIn .3s ease-out both}
  @keyframes tileIn{from{opacity:0;transform:translateY(6px)}}
  .tile-header{padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border-light)}
  .tile-title{font-size:15px;font-weight:700;color:var(--text)}
  .tile-count{font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500;background:var(--accent-light);color:var(--accent);padding:2px 8px;border-radius:var(--radius-sm)}
  .tile-tabs{display:flex;gap:2px;background:var(--bg);padding:3px;border-radius:var(--radius-sm);border:1px solid var(--border-light);margin-left:auto}
  .tt-btn{padding:5px 13px;border:none;background:transparent;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:500;color:var(--text-light);cursor:pointer;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .tt-btn:hover{color:var(--text-mid)}
  .tt-btn.on{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,0.06);font-weight:600}
  .tt-btn .c{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--text-light);background:var(--border-light);padding:0 6px;border-radius:var(--radius-sm);line-height:17px;min-width:20px;text-align:center;font-weight:500}
  .tt-btn.on .c{background:var(--accent-light);color:var(--accent)}

  /* TABLE */
  .table-wrap{overflow-x:auto;overflow-y:visible}
  .table-wrap::-webkit-scrollbar{height:8px}
  .table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  table{width:100%;border-collapse:collapse;min-width:900px}
  thead tr{background:var(--bg);position:sticky;top:0;z-index:2}
  th{padding:10px var(--cell-pad-x);text-align:left;font-size:var(--font-header);font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-light);border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
  th:first-child{padding-left:20px}
  th:last-child{padding-right:20px;width:40px}
  th.sortable{cursor:pointer;transition:color .12s}
  th.sortable:hover{color:var(--text)}
  th.sortable .sort-icon{display:inline-flex;vertical-align:middle;margin-left:3px;opacity:0.5;transition:opacity .12s}
  th.sortable:hover .sort-icon{opacity:0.8}
  th.sortable.sorted{color:var(--accent)}
  th.sortable.sorted .sort-icon{opacity:1;color:var(--accent)}

  tbody tr{border-bottom:1px solid var(--border-light);transition:background .1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:nth-child(even){background:#f8fafc}
  tbody tr:hover,tbody tr:nth-child(even):hover{background:var(--row-hover)}
  td{padding:var(--row-pad-y) var(--cell-pad-x);font-size:var(--font-body);color:var(--text-mid);vertical-align:middle}
  td:first-child{padding-left:20px}
  td:last-child{padding-right:20px}

  .td-code{font-family:'DM Mono',monospace;font-size:var(--font-mono);font-weight:600;color:var(--accent);background:var(--accent-light);padding:3px 9px;border-radius:var(--radius-sm);display:inline-block;letter-spacing:0.02em}
  .td-route{font-size:var(--font-body);color:var(--text-mid);line-height:1.4;max-width:480px;white-space:normal;word-break:break-word}
  .td-dist{font-family:'DM Mono',monospace;font-size:var(--font-mono);color:var(--text);font-weight:600;font-variant-numeric:tabular-nums}
  .td-dist .unit{font-size:10.5px;color:var(--text-light);font-weight:400;margin-left:3px}
  .td-basis{font-size:13px;color:var(--text-mid);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block}

  /* vehicle cell */
  .vehicle-cell{display:inline-flex;align-items:center;gap:6px;padding:3px 9px 3px 7px;border-radius:var(--radius-pill);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;max-width:200px}
  .vehicle-cell.assigned{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-soft)}
  .vehicle-cell.assigned::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .vehicle-cell.empty{color:var(--text-light);font-weight:400;border:1px dashed var(--border);padding:3px 9px;background:transparent}
  .vehicle-cell:hover{opacity:0.78}
  .vehicle-cell.empty:hover{border-color:var(--accent);color:var(--accent);opacity:1;border-style:solid;background:var(--accent-light)}

  /* row actions */
  .acts{display:flex;gap:2px;opacity:0;transition:opacity .12s;justify-content:flex-end}
  tbody tr:hover .acts{opacity:1}
  .act{width:28px;height:28px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;color:var(--text-light);display:flex;align-items:center;justify-content:center;transition:all .12s}
  .act:hover.e{background:var(--accent-light);color:var(--accent)}
  .act:hover.d{background:#fee2e2;color:#dc2626}
  .act svg{width:14px;height:14px}

  /* footer */
  .t-foot{padding:10px 20px;border-top:1px solid var(--border-light);font-size:13px;color:var(--text-light);display:flex;align-items:center;background:var(--bg)}
  .t-foot .count-text b{color:var(--text);font-weight:600}

  /* empty */
  .empty-state{padding:64px 24px;text-align:center;color:var(--text-light)}
  .empty-state svg{width:44px;height:44px;color:var(--border);margin-bottom:14px}
  .empty-state p{font-size:14.5px;margin-bottom:14px}
  .empty-state .reset{color:var(--accent);cursor:pointer;font-weight:600;font-size:13.5px;text-decoration:underline}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,0.4);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-xl);width:580px;max-width:calc(100vw - 48px);max-height:calc(100vh - 80px);overflow-y:auto;transform:translateY(12px) scale(0.98);transition:transform .2s}
  .overlay.open .modal{transform:translateY(0) scale(1)}
  .modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
  .modal-title{font-size:17px;font-weight:700}
  .modal-close{width:30px;height:30px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;color:var(--text-light);display:flex;align-items:center;justify-content:center;transition:all .12s}
  .modal-close:hover{background:var(--bg);color:var(--text)}
  .modal-body{padding:20px 24px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group.full{grid-column:span 2}
  .form-label{font-size:12.5px;font-weight:600;color:var(--text-mid)}
  .form-input,.form-textarea{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13.5px;color:var(--text);background:var(--bg);outline:none;transition:all .15s}
  .form-input:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:var(--surface)}
  .form-input::placeholder,.form-textarea::placeholder{color:var(--text-light)}
  .form-textarea{min-height:80px;resize:vertical;line-height:1.5}
  .btn-cancel{padding:9px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13.5px;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .12s}
  .btn-cancel:hover{border-color:var(--text-light);color:var(--text)}
  .btn-submit{padding:9px 20px;background:var(--accent);border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:13.5px;font-weight:600;color:#fff;cursor:pointer;transition:all .15s}
  .btn-submit:hover{background:var(--accent-dark)}

  /* vehicle pick modal */
  .vehicle-modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-xl);width:440px;max-width:calc(100vw - 48px);max-height:calc(100vh - 80px);overflow-y:auto;transform:translateY(12px) scale(0.98);transition:transform .2s}
  .overlay.open .vehicle-modal{transform:translateY(0) scale(1)}
  .vehicle-modal-sub{font-size:12.5px;color:var(--text-light);font-weight:400;margin-top:2px}
  .dm-section{padding:14px 20px;border-bottom:1px solid var(--border-light)}
  .dm-section:last-child{border-bottom:none}
  .dm-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-light);margin-bottom:10px}
  .current-vehicle-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--accent-light);border:1px solid var(--accent-soft);border-radius:var(--radius-sm)}
  .current-vehicle-idx{font-family:'DM Mono',monospace;font-size:11.5px;font-weight:600;color:var(--accent);background:#fff;padding:3px 8px;border-radius:var(--radius-sm);flex-shrink:0}
  .current-vehicle-info{flex:1;min-width:0}
  .current-vehicle-name{font-size:13.5px;font-weight:600;color:var(--text)}
  .current-vehicle-sub{font-size:11px;color:var(--text-light)}
  .btn-remove-vehicle{padding:5px 11px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:11.5px;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all .12s;flex-shrink:0}
  .btn-remove-vehicle:hover{border-color:var(--red);color:var(--red)}

  .vehicle-list{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto;padding-right:2px}
  .vehicle-list::-webkit-scrollbar{width:4px}
  .vehicle-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .vehicle-list-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .12s}
  .vehicle-list-item:hover{border-color:var(--accent);background:var(--accent-soft)}
  .vehicle-list-idx{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:3px 8px;border-radius:var(--radius-sm);flex-shrink:0}
  .vehicle-list-info{flex:1;min-width:0}
  .vehicle-list-name{font-size:13px;font-weight:600;color:var(--text)}
  .vehicle-list-sub{font-size:10.5px;color:var(--text-light)}
  .btn-pick{padding:5px 11px;background:var(--accent-light);border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:11.5px;font-weight:600;color:var(--accent);cursor:pointer;transition:all .12s;flex-shrink:0}
  .btn-pick:hover{background:var(--accent);color:#fff}

  /* toast */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:11px 20px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;box-shadow:var(--shadow-xl);z-index:200;opacity:0;transition:all .25s;display:flex;align-items:center;gap:10px}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast .undo{color:#a3e635;cursor:pointer;font-weight:600;text-decoration:underline;padding:0 4px}
  .toast .undo:hover{color:#d9f99d}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-area">
    <div class="logo-sq"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
    <span class="logo-text">MARSH</span>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="vehicles.html">Автомобілі</a>
    <a class="nav-link active" href="routes.html">Маршрути <span class="cnt" id="nav-count">12</span></a>
    <a class="nav-link" href="drivers.html">Водії</a>
    <a class="nav-link" href="departures.html">Виїзди</a>
    <a class="nav-link" href="schedule.html">Графік</a>
    <a class="nav-link" href="users.html">Користувачі</a>
  </div>
  <div class="tb-right">
    <div class="tb-search" id="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-light);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="search-input" placeholder="Пошук за кодом, маршрутом, підставою..." oninput="onSearchInput()">
      <button class="clear-x" onclick="clearSearch()" title="Очистити"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <button class="btn-primary" onclick="openAddModal()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Додати</button>
    <div class="user-pill"><div class="user-dot">ОП</div><span>Оператор</span></div>
  </div>
</div>

<div class="content-scroll">
  <div class="tile">
    <div class="tile-header">
      <span class="tile-title">Маршрути</span>
      <span class="tile-count" id="tile-count">12</span>
      <div class="tile-tabs">
        <button class="tt-btn on" onclick="setFilter('all', this)">Всі <span class="c" id="c-all">12</span></button>
        <button class="tt-btn" onclick="setFilter('assigned', this)">З авто <span class="c" id="c-a">10</span></button>
        <button class="tt-btn" onclick="setFilter('unassigned', this)">Без авто <span class="c" id="c-u">2</span></button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th class="sortable" data-sort="code">Код <span class="sort-icon"></span></th>
          <th class="sortable" data-sort="route">Маршрут <span class="sort-icon"></span></th>
          <th class="sortable" style="text-align:right" data-sort="distance">Відстань <span class="sort-icon"></span></th>
          <th class="sortable" data-sort="basis">Підстава <span class="sort-icon"></span></th>
          <th>Автомобіль</th>
          <th></th>
        </tr></thead>
        <tbody id="routes-tbody"></tbody>
      </table>
    </div>
    <div class="t-foot"><span class="count-text" id="count-text"></span></div>
  </div>
</div>

<!-- ROUTE MODAL -->
<div class="overlay" id="route-overlay" onclick="handleOverlayClick(event,'route-overlay')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="route-modal-title">Додати маршрут</div>
      <button class="modal-close" onclick="closeRouteModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Код маршруту *</label><input class="form-input" id="f-code" placeholder="Л37" maxlength="6" style="font-family:'DM Mono',monospace;letter-spacing:0.04em;text-transform:uppercase"></div>
        <div class="form-group"><label class="form-label">Відстань (км) *</label><input class="form-input" id="f-distance" placeholder="68" type="number" min="0" step="0.1"></div>
        <div class="form-group full"><label class="form-label">Маршрут *</label><textarea class="form-textarea" id="f-route" placeholder="Межова → Новолозуватівка → Слов'янка → ..."></textarea></div>
        <div class="form-group full"><label class="form-label">Підстава</label><input class="form-input" id="f-basis" placeholder="мед, зв'язок, відрядження..." maxlength="50"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeRouteModal()">Скасувати</button>
      <button class="btn-submit" id="route-modal-submit" onclick="submitRoute()">Додати</button>
    </div>
  </div>
</div>

<!-- VEHICLE PICK MODAL -->
<div class="overlay" id="vpick-overlay" onclick="handleOverlayClick(event,'vpick-overlay')">
  <div class="vehicle-modal">
    <div class="modal-head">
      <div>
        <div class="modal-title">Обрати автомобіль</div>
        <div class="vehicle-modal-sub" id="vpick-modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeVPickModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="dm-section" id="vpick-current-section"><div class="dm-section-title">Поточний автомобіль</div><div id="vpick-current-content"></div></div>
    <div class="dm-section"><div class="dm-section-title">Автомобілі</div><div class="vehicle-list" id="vpick-list"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let nextRouteId = 100;

const vehicles = [
  { id:1,  index:'1001W', name:'Nissan Navara',     subdivision:'Відділ 1' },
  { id:2,  index:'1002W', name:'Nissan Navara',     subdivision:'Відділ 1' },
  { id:3,  index:'1003W', name:'Honda CR-V',        subdivision:'Відділ 2' },
  { id:4,  index:'1004W', name:'Toyota Hilux',      subdivision:'Відділ 2' },
  { id:5,  index:'1005W', name:'Toyota Hilux',      subdivision:'Відділ 2' },
  { id:6,  index:'1006W', name:'Toyota Hilux',      subdivision:'Відділ 3' },
  { id:7,  index:'1007W', name:'Toyota Hilux',      subdivision:'Відділ 3' },
  { id:8,  index:'1008W', name:'Nissan Pathfinder', subdivision:'Відділ 1' },
  { id:9,  index:'1009W', name:'Man TGE',           subdivision:'Відділ 2' },
  { id:10, index:'1010W', name:'VW Transporter T4', subdivision:'Відділ 3' },
  { id:11, index:'1011W', name:'VW Transporter T5', subdivision:'Відділ 2' },
  { id:12, index:'1012W', name:'Toyota Hiace',      subdivision:'Відділ 1' },
  { id:13, index:'1013W', name:'VW Crafter',        subdivision:'Відділ 3' },
];

let routes = [
  { id:1,  code:'Л37', route:"Межова → Новолозуватівка → Слов'янка → Андронівка → Калинівка → Сергіївка → Новоолександрівка → Сергіївка → Калинівка → Андронівка → Слов'янка → Новолозуватівка → Межова", distance:68, basis:'мед', vehicleId:1 },
  { id:2,  code:'Б98', route:'Покровськ → Гродівка → Родинське → Миролюбівка → Зеленівка → Миролюбівка → Родинське → Гродівка → Покровськ', distance:42, basis:'відрядження', vehicleId:4 },
  { id:3,  code:'К15', route:'Краматорськ → Олексієво-Дружківка → Дружківка → Костянтинівка → Ліски → Костянтинівка → Дружківка → Олексієво-Дружківка → Краматорськ', distance:55, basis:"зв'язок", vehicleId:5 },
  { id:4,  code:'М44', route:'Мирноград → Курахове → Вугледар → Новогродівка → Селидове → Новогродівка → Вугледар → Курахове → Мирноград', distance:78, basis:'отримання запчастин', vehicleId:2 },
  { id:5,  code:'С22', route:"Слов'янськ → Лиман → Ямпіль → Закітне → Ямпіль → Лиман → Слов'янськ", distance:91, basis:'мед', vehicleId:null },
  { id:6,  code:'В71', route:'Волноваха → Докучаєвськ → Оленівка → Стила → Оленівка → Докучаєвськ → Волноваха', distance:60, basis:'відрядження', vehicleId:6 },
  { id:7,  code:'Н83', route:'Новопавлівка → Велика Новосілка → Тимошівка → Комар → Тимошівка → Велика Новосілка → Новопавлівка', distance:47, basis:"зв'язок", vehicleId:7 },
  { id:8,  code:'П56', route:'Покровськ → Мирноград → Первомайськ → Білозерське → Первомайськ → Мирноград → Покровськ', distance:38, basis:'', vehicleId:9 },
  { id:9,  code:'Г29', route:'Горлівка → Дзержинськ → Торецьк → Щербинівка → Торецьк → Дзержинськ → Горлівка', distance:52, basis:'отримання продовольства', vehicleId:null },
  { id:10, code:'З63', route:'Запоріжжя → Токмак → Оріхів → Гуляйполе → Оріхів → Токмак → Запоріжжя', distance:184, basis:'відрядження', vehicleId:11 },
  { id:11, code:'Д18', route:'Дніпро → Павлоград → Петропавлівка → Магдалинівка → Петропавлівка → Павлоград → Дніпро', distance:137, basis:'мед', vehicleId:12 },
  { id:12, code:'Х51', route:'Харків → Чугуїв → Балаклія → Ізюм → Балаклія → Чугуїв → Харків', distance:196, basis:"зв'язок", vehicleId:13 },
];

// STATE
let vpickRouteId = null;
let editingRouteId = null;
let currentFilter = 'all';
let sortState = { key:null, dir:'asc' };
let lastDeleted = null;

const getVehicle = id => id ? vehicles.find(v => v.id === id) : null;

function showToast(msg, undoFn) {
  const t = document.getElementById('toast');
  t.innerHTML = msg + (undoFn ? ' <span class="undo" id="toast-undo">Скасувати</span>' : '');
  t.classList.add('show');
  if (undoFn) document.getElementById('toast-undo').onclick = () => { undoFn(); t.classList.remove('show'); };
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 5000);
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let arr = routes.filter(r => {
    const fm = currentFilter === 'all' || (currentFilter === 'assigned' && r.vehicleId) || (currentFilter === 'unassigned' && !r.vehicleId);
    if (!fm) return false;
    if (!q) return true;
    const v = getVehicle(r.vehicleId);
    return r.code.toLowerCase().includes(q) || r.route.toLowerCase().includes(q)
      || (r.basis || '').toLowerCase().includes(q)
      || (v && (v.index.toLowerCase().includes(q) || v.name.toLowerCase().includes(q)));
  });
  if (sortState.key) {
    const k = sortState.key, dir = sortState.dir === 'asc' ? 1 : -1;
    arr.sort((a,b) => {
      let av = a[k], bv = b[k];
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === 'string') return av.localeCompare(bv, 'uk') * dir;
      return (av - bv) * dir;
    });
  }
  return arr;
}

function setSort(key) {
  if (sortState.key === key) {
    if (sortState.dir === 'asc') sortState.dir = 'desc';
    else { sortState.key = null; sortState.dir = 'asc'; }
  } else { sortState.key = key; sortState.dir = 'asc'; }
  renderTable(); updateSortHeaders();
}

function updateSortHeaders() {
  document.querySelectorAll('th.sortable').forEach(th => {
    const k = th.dataset.sort;
    th.classList.toggle('sorted', k === sortState.key);
    const icon = th.querySelector('.sort-icon');
    if (k === sortState.key) {
      icon.innerHTML = sortState.dir === 'asc'
        ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>'
        : '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>';
    } else {
      icon.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 9l4-4 4 4M16 15l-4 4-4-4"/></svg>';
    }
  });
}

function renderTable() {
  const filtered = getFiltered();
  const tbody = document.getElementById('routes-tbody');
  const foot = document.getElementById('count-text');
  document.getElementById('nav-count').textContent = routes.length;
  document.getElementById('tile-count').textContent = filtered.length;
  document.getElementById('c-all').textContent = routes.length;
  document.getElementById('c-a').textContent = routes.filter(r => r.vehicleId).length;
  document.getElementById('c-u').textContent = routes.filter(r => !r.vehicleId).length;

  if (filtered.length === 0) {
    const hasF = currentFilter !== 'all' || document.getElementById('search-input').value;
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      <p>${hasF ? 'За вашими критеріями нічого не знайдено' : 'Поки немає маршрутів'}</p>
      ${hasF ? '<span class="reset" onclick="resetAll()">Скинути фільтри</span>' : ''}
    </div></td></tr>`;
    foot.innerHTML = '';
    return;
  }
  tbody.innerHTML = filtered.map(r => renderRow(r)).join('');
  foot.innerHTML = `Показано <b>${filtered.length}</b> з <b>${routes.length}</b>`;
}

function renderRow(r) {
  const v = getVehicle(r.vehicleId);
  const vehicleCell = v
    ? `<span class="vehicle-cell assigned" onclick="openVPickModal(${r.id})" title="${v.index} ${v.name}">${v.index} ${v.name}</span>`
    : `<span class="vehicle-cell empty" onclick="openVPickModal(${r.id})">+ Призначити</span>`;
  return `<tr>
    <td><span class="td-code">${r.code}</span></td>
    <td><div class="td-route">${r.route}</div></td>
    <td style="text-align:right"><span class="td-dist">${r.distance}<span class="unit">км</span></span></td>
    <td><span class="td-basis" title="${r.basis || ''}">${r.basis || '—'}</span></td>
    <td>${vehicleCell}</td>
    <td><div class="acts">
      <button class="act e" onclick="openEditModal(${r.id})" title="Редагувати"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="act d" onclick="deleteRoute(${r.id})" title="Видалити"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
    </div></td>
  </tr>`;
}

function onSearchInput() {
  const inp = document.getElementById('search-input');
  document.getElementById('search-wrap').classList.toggle('has-value', !!inp.value);
  renderTable();
}
function clearSearch() { document.getElementById('search-input').value = ''; document.getElementById('search-wrap').classList.remove('has-value'); renderTable(); }
function setFilter(f, btn) { currentFilter = f; document.querySelectorAll('.tt-btn').forEach(b => b.classList.remove('on')); btn.classList.add('on'); renderTable(); }
function resetAll() { currentFilter = 'all'; document.getElementById('search-input').value = ''; document.getElementById('search-wrap').classList.remove('has-value'); document.querySelectorAll('.tt-btn').forEach((b,i) => b.classList.toggle('on', i === 0)); renderTable(); }

function openAddModal() {
  editingRouteId = null;
  document.getElementById('route-modal-title').textContent = 'Додати маршрут';
  document.getElementById('route-modal-submit').textContent = 'Додати';
  ['f-code','f-route','f-distance','f-basis'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('route-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-code').focus(), 80);
}

function openEditModal(id) {
  const r = routes.find(r => r.id === id); if (!r) return;
  editingRouteId = id;
  document.getElementById('route-modal-title').textContent = 'Редагувати маршрут';
  document.getElementById('route-modal-submit').textContent = 'Зберегти';
  document.getElementById('f-code').value = r.code;
  document.getElementById('f-route').value = r.route;
  document.getElementById('f-distance').value = r.distance;
  document.getElementById('f-basis').value = r.basis || '';
  document.getElementById('route-overlay').classList.add('open');
}

function closeRouteModal() { document.getElementById('route-overlay').classList.remove('open'); }

function submitRoute() {
  const code = document.getElementById('f-code').value.trim().toUpperCase();
  const routeStr = document.getElementById('f-route').value.trim();
  const distance = parseFloat(document.getElementById('f-distance').value);
  let valid = true;
  [['f-code',code],['f-route',routeStr],['f-distance',isNaN(distance)?'':'ok']].forEach(([id,v]) => {
    const el = document.getElementById(id);
    if (!v) { el.style.borderColor = 'var(--red)'; setTimeout(() => el.style.borderColor = '', 2000); valid = false; }
  });
  if (!valid) return;
  const data = { code, route: routeStr, distance, basis: document.getElementById('f-basis').value.trim() };
  if (editingRouteId !== null) {
    const r = routes.find(r => r.id === editingRouteId);
    if (r) Object.assign(r, data);
    showToast('Збережено');
  } else {
    routes.push({ id: ++nextRouteId, vehicleId: null, ...data });
    showToast(`Додано маршрут «${code}»`);
  }
  closeRouteModal();
  renderTable();
}

function deleteRoute(id) {
  const r = routes.find(r => r.id === id); if (!r) return;
  lastDeleted = { ...r };
  routes = routes.filter(r => r.id !== id);
  renderTable();
  showToast(`Видалено маршрут «${r.code}»`, () => {
    routes.push(lastDeleted);
    renderTable();
  });
}

function openVPickModal(routeId) {
  vpickRouteId = routeId;
  const r = routes.find(r => r.id === routeId);
  document.getElementById('vpick-modal-sub').textContent = r ? `Маршрут ${r.code}` : '';
  renderVPickModal();
  document.getElementById('vpick-overlay').classList.add('open');
}
function closeVPickModal() { document.getElementById('vpick-overlay').classList.remove('open'); }

function renderVPickModal() {
  const r = routes.find(r => r.id === vpickRouteId);
  const current = getVehicle(r.vehicleId);
  const cs = document.getElementById('vpick-current-section');
  const cc = document.getElementById('vpick-current-content');
  if (current) {
    cs.style.display = '';
    cc.innerHTML = `<div class="current-vehicle-row">
      <span class="current-vehicle-idx">${current.index}</span>
      <div class="current-vehicle-info"><div class="current-vehicle-name">${current.name}</div>${current.subdivision ? `<div class="current-vehicle-sub">${current.subdivision}</div>` : ''}</div>
      <button class="btn-remove-vehicle" onclick="removeVehicle()">Зняти</button>
    </div>`;
  } else cs.style.display = 'none';
  document.getElementById('vpick-list').innerHTML = vehicles.map(v => `
    <div class="vehicle-list-item" onclick="assignVehicle(${v.id})">
      <span class="vehicle-list-idx">${v.index}</span>
      <div class="vehicle-list-info"><div class="vehicle-list-name">${v.name}</div>${v.subdivision ? `<div class="vehicle-list-sub">${v.subdivision}</div>` : ''}</div>
      <button class="btn-pick">Обрати</button>
    </div>`).join('');
}

function assignVehicle(vehicleId) {
  const r = routes.find(r => r.id === vpickRouteId);
  if (r) r.vehicleId = vehicleId;
  closeVPickModal(); renderTable();
}
function removeVehicle() {
  const r = routes.find(r => r.id === vpickRouteId);
  if (r) r.vehicleId = null;
  renderVPickModal(); renderTable();
}

function handleOverlayClick(e, id) { if (e.target.id === id) document.getElementById(id).classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.overlay.open').forEach(o => o.classList.remove('open')); });
document.querySelectorAll('th.sortable').forEach(th => th.onclick = () => setSort(th.dataset.sort));

renderTable(); updateSortHeaders();
</script>
</body>
</html>
