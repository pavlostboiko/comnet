<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComNet — Майно</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0; --border-light:#f1f5f9;
    --text:#0f172a; --text-mid:#475569; --text-light:#94a3b8;
    --accent:#475569; --accent-light:#e2e8f0; --accent-dark:#334155;
    --accent-soft:rgba(71,85,105,0.08); --accent-ring:rgba(71,85,105,0.18);
    --row-hover:#f1f5f9;
    --green-bg:#d1fae5; --green-text:#065f46;
    --red:#ef4444; --red-bg:#fee2e2; --red-text:#991b1b;
    --shadow:0 1px 3px rgba(15,23,42,0.06),0 0 0 1px rgba(15,23,42,0.04);
    --shadow-lg:0 4px 16px rgba(15,23,42,0.08),0 0 0 1px rgba(15,23,42,0.04);
    --shadow-xl:0 20px 40px rgba(15,23,42,0.14),0 0 0 1px rgba(15,23,42,0.05);
    --radius:4px; --radius-sm:3px; --radius-pill:6px;
    --row-pad-y:10px; --cell-pad-x:12px;
    --font-body:14px; --font-mono:12.5px; --font-header:11px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* TOPBAR */
  .topbar { height:54px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; flex-shrink:0; }
  .logo-area { display:flex; align-items:center; gap:9px; margin-right:32px; }
  .logo-sq { width:28px; height:28px; background:var(--accent); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; }
  .logo-text { font-size:15px; font-weight:700; letter-spacing:-0.02em; }
  .nav-links { display:flex; align-items:stretch; height:100%; }
  .nav-link { display:flex; align-items:center; padding:0 13px; font-size:13.5px; font-weight:500; color:var(--text-mid); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; text-decoration:none; white-space:nowrap; }
  .nav-link:hover { color:var(--text); }
  .nav-link.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  .tb-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .tb-search { display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:7px 12px; width:240px; transition:all 0.2s; }
  .tb-search:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); background:var(--surface); width:300px; }
  .tb-search input { border:none; background:transparent; font-family:inherit; font-size:13.5px; color:var(--text); outline:none; width:100%; }
  .tb-search input::placeholder { color:var(--text-light); }
  .btn-primary { display:flex; align-items:center; gap:5px; padding:8px 14px; background:var(--accent); border:none; border-radius:var(--radius-sm); font-family:inherit; font-size:13.5px; font-weight:600; color:white; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .btn-primary:hover { background:var(--accent-dark); transform:translateY(-1px); box-shadow:0 4px 12px var(--accent-ring); }
  .user-pill { display:flex; align-items:center; gap:6px; padding:4px 10px 4px 5px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-pill); }
  .user-dot { width:24px; height:24px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9.5px; font-weight:700; color:white; }
  .user-pill span { font-size:13px; font-weight:500; color:var(--text-mid); }

  /* CONTENT */
  .content-scroll { flex:1; overflow-y:auto; padding:20px 24px; }
  .content-scroll::-webkit-scrollbar { width:6px; }
  .content-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* TILE */
  .tile { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; animation:tileIn 0.3s ease-out both; }
  @keyframes tileIn { from { opacity:0; transform:translateY(6px); } }
  .tile-header { padding:12px 20px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border-light); flex-wrap:wrap; }
  .tile-title { font-size:15px; font-weight:700; }
  .tile-count { font-family:'DM Mono',monospace; font-size:11.5px; font-weight:500; background:var(--accent-light); color:var(--accent); padding:2px 8px; border-radius:var(--radius-sm); }
  .tile-tabs { display:flex; gap:2px; background:var(--bg); padding:3px; border-radius:var(--radius-sm); border:1px solid var(--border-light); margin-left:auto; }
  .tt-btn { padding:5px 13px; border:none; background:transparent; border-radius:var(--radius-sm); font-family:inherit; font-size:13px; font-weight:500; color:var(--text-light); cursor:pointer; transition:all 0.12s; white-space:nowrap; display:flex; align-items:center; gap:6px; }
  .tt-btn:hover { color:var(--text-mid); }
  .tt-btn.on { background:var(--surface); color:var(--text); box-shadow:0 1px 2px rgba(0,0,0,0.06); font-weight:600; }
  .tt-btn .c { font-family:'DM Mono',monospace; font-size:10.5px; color:var(--text-light); background:var(--border-light); padding:0 6px; border-radius:var(--radius-sm); line-height:17px; min-width:20px; text-align:center; }
  .tt-btn.on .c { background:var(--accent-light); color:var(--accent); }

  /* CHIPS */
  .sub-row { padding:9px 20px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border-light); background:var(--bg); flex-wrap:wrap; }
  .sub-row-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-light); flex-shrink:0; }
  .sub-chips { display:flex; gap:6px; flex-wrap:wrap; }
  .sub-chip { padding:4px 11px; border:1px solid var(--border); background:var(--surface); border-radius:var(--radius-pill); font-size:12.5px; font-weight:500; color:var(--text-mid); cursor:pointer; transition:all 0.12s; }
  .sub-chip:hover { border-color:var(--text-light); color:var(--text); }
  .sub-chip.on { background:var(--accent); border-color:var(--accent); color:white; font-weight:600; }
  .sub-clear { margin-left:auto; font-size:12px; color:var(--text-light); cursor:pointer; padding:3px 8px; border-radius:var(--radius-sm); transition:all 0.12s; flex-shrink:0; }
  .sub-clear:hover { color:var(--text); background:var(--border-light); }

  /* TABLE */
  .table-wrap { overflow-x:auto; }
  .table-wrap::-webkit-scrollbar { height:6px; }
  .table-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  table { width:100%; border-collapse:collapse; min-width:1000px; }
  thead tr { background:var(--bg); }
  th { padding:9px var(--cell-pad-x); text-align:left; font-size:var(--font-header); font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-light); border-bottom:1px solid var(--border); white-space:nowrap; user-select:none; }
  th:first-child { padding-left:20px; }
  th:last-child { padding-right:20px; width:52px; }
  tbody tr { border-bottom:1px solid var(--border-light); transition:background 0.1s; cursor:pointer; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:nth-child(even) { background:#f8fafc; }
  tbody tr:hover { background:var(--row-hover) !important; }
  td { padding:var(--row-pad-y) var(--cell-pad-x); font-size:var(--font-body); color:var(--text-mid); vertical-align:middle; white-space:nowrap; }
  td:first-child { padding-left:20px; }
  td:last-child { padding-right:20px; }
  .td-num-badge { font-family:'DM Mono',monospace; font-size:11px; font-weight:600; color:var(--accent); background:var(--accent-light); padding:2px 8px; border-radius:var(--radius-sm); display:inline-block; }
  .td-name { font-weight:600; color:var(--text); }
  .td-name:hover { color:var(--accent); text-decoration:underline; }
  .td-mono { font-family:'DM Mono',monospace; font-size:var(--font-mono); }
  .td-serial { font-family:'DM Mono',monospace; font-size:var(--font-mono); color:var(--text-mid); }
  .td-serial.none { color:var(--text-light); font-style:italic; font-family:'DM Sans',sans-serif; font-size:12.5px; }
  .td-num-val { font-family:'DM Mono',monospace; font-size:var(--font-mono); text-align:right; font-variant-numeric:tabular-nums; }
  .td-qty-large { color:var(--text); font-weight:600; }

  /* Category badges */
  .cat-badge { display:inline-block; padding:2px 8px; border-radius:var(--radius-sm); font-size:11.5px; font-weight:600; font-family:'DM Mono',monospace; }
  .cat-1   { background:#eff6ff; color:#2563eb; }
  .cat-2   { background:#ecfdf5; color:#059669; }
  .cat-3   { background:#fef9c3; color:#a16207; }
  .cat-4   { background:#fff7ed; color:#c2410c; }
  .cat-5   { background:#fef2f2; color:#b91c1c; }
  .cat-pr  { background:#f0fdf4; color:#16a34a; }
  .cat-npr { background:#fef2f2; color:#dc2626; }

  /* Type chip */
  .type-chip { display:inline-block; padding:2px 9px; border-radius:var(--radius-pill); font-size:12px; font-weight:500; background:var(--border-light); color:var(--text-mid); white-space:nowrap; }

  /* Row actions */
  .acts { display:flex; gap:2px; opacity:0; transition:opacity 0.12s; justify-content:flex-end; }
  tbody tr:hover .acts { opacity:1; }
  .act { width:28px; height:28px; border-radius:var(--radius-sm); border:none; background:transparent; cursor:pointer; color:var(--text-light); display:flex; align-items:center; justify-content:center; transition:all 0.12s; }
  .act:hover.e { background:var(--accent-light); color:var(--accent); }
  .act:hover.d { background:var(--red-bg); color:var(--red); }
  .act svg { width:14px; height:14px; }

  /* Footer */
  .t-foot { padding:10px 20px; border-top:1px solid var(--border-light); font-size:13px; color:var(--text-light); display:flex; align-items:center; background:var(--bg); }
  .t-foot b { color:var(--text); font-weight:600; }

  /* OVERLAY */
  .overlay { position:fixed; inset:0; background:rgba(15,23,42,0.4); backdrop-filter:blur(2px); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .overlay.open { opacity:1; pointer-events:all; }

  /* CARD MODAL */
  .card-modal { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow-xl); width:740px; max-width:calc(100vw - 48px); max-height:calc(100vh - 60px); overflow-y:auto; transform:translateY(12px) scale(0.98); transition:transform 0.2s; display:flex; flex-direction:column; }
  .overlay.open .card-modal { transform:translateY(0) scale(1); }

  .card-head { padding:20px 24px 16px; border-bottom:1px solid var(--border-light); display:flex; align-items:flex-start; gap:12px; position:sticky; top:0; background:var(--surface); z-index:1; }
  .card-head-info { flex:1; min-width:0; }
  .card-head-num { font-family:'DM Mono',monospace; font-size:11px; font-weight:600; color:var(--accent); background:var(--accent-light); padding:2px 8px; border-radius:var(--radius-sm); display:inline-block; margin-bottom:6px; }
  .card-head-name { font-size:18px; font-weight:700; color:var(--text); line-height:1.2; margin-bottom:8px; }
  .card-head-badges { display:flex; gap:6px; flex-wrap:wrap; }
  .card-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .btn-edit-card { display:flex; align-items:center; gap:5px; padding:7px 12px; background:var(--accent-light); border:none; border-radius:var(--radius-sm); font-family:inherit; font-size:12.5px; font-weight:600; color:var(--accent); cursor:pointer; transition:all 0.12s; }
  .btn-edit-card:hover { background:var(--accent); color:white; }
  .modal-close { width:30px; height:30px; border-radius:var(--radius-sm); border:none; background:transparent; cursor:pointer; color:var(--text-light); display:flex; align-items:center; justify-content:center; transition:all 0.12s; }
  .modal-close:hover { background:var(--bg); color:var(--text); }

  .card-body { padding:20px 24px; display:flex; flex-direction:column; gap:20px; }
  .card-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-light); margin-bottom:10px; }
  .card-fields { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px 20px; }
  .card-field { display:flex; flex-direction:column; gap:3px; }
  .card-field-label { font-size:11px; font-weight:600; color:var(--text-light); text-transform:uppercase; letter-spacing:0.04em; }
  .card-field-value { font-size:14px; color:var(--text); font-weight:500; }
  .card-field-value.mono { font-family:'DM Mono',monospace; font-size:13px; }
  .card-field-value.dim { color:var(--text-light); font-style:italic; }
  .card-divider { border:none; border-top:1px solid var(--border-light); }

  /* Document cards */
  .doc-list { display:flex; flex-wrap:wrap; gap:8px; }
  .doc-card { padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); min-width:160px; }
  .doc-card-type { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-light); margin-bottom:4px; }
  .doc-card-num { font-family:'DM Mono',monospace; font-size:13px; font-weight:600; color:var(--text); }
  .doc-card-date { font-size:12px; color:var(--text-light); margin-top:2px; }
  .doc-empty { font-size:13px; color:var(--text-light); font-style:italic; padding:8px 0; }

  /* FORM MODAL */
  .form-modal { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow-xl); width:660px; max-width:calc(100vw - 48px); max-height:calc(100vh - 60px); overflow-y:auto; transform:translateY(12px) scale(0.98); transition:transform 0.2s; }
  .overlay.open .form-modal { transform:translateY(0) scale(1); }
  .modal-head { padding:20px 24px 16px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--surface); z-index:1; }
  .modal-title { font-size:17px; font-weight:700; }
  .modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:20px; }
  .modal-foot { padding:16px 24px; border-top:1px solid var(--border-light); display:flex; justify-content:flex-end; gap:8px; position:sticky; bottom:0; background:var(--surface); }

  .form-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-light); margin-bottom:10px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:span 2; }
  .form-label { font-size:12.5px; font-weight:600; color:var(--text-mid); }
  .form-input { padding:9px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:inherit; font-size:13.5px; color:var(--text); background:var(--bg); outline:none; transition:all 0.15s; }
  .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); background:var(--surface); }
  .form-input::placeholder { color:var(--text-light); }
  .form-input:disabled { opacity:0.5; cursor:not-allowed; }
  .form-select { padding:9px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:inherit; font-size:13.5px; color:var(--text); background:var(--bg); outline:none; cursor:pointer; transition:all 0.15s; appearance:none; background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 10px center; padding-right:28px; }
  .form-select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

  /* Serial toggle */
  .serial-toggle { display:flex; gap:0; border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
  .serial-opt { flex:1; padding:8px 12px; border:none; background:transparent; font-family:inherit; font-size:13px; font-weight:500; color:var(--text-mid); cursor:pointer; transition:all 0.12s; text-align:center; }
  .serial-opt.on { background:var(--accent); color:white; font-weight:600; }
  .serial-opt:not(.on):hover { background:var(--bg); }

  /* Docs in form */
  .doc-form-list { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
  .doc-form-row { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:8px; align-items:center; padding:10px 12px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); }
  .btn-add-doc { display:flex; align-items:center; gap:5px; padding:7px 12px; border:1px dashed var(--border); border-radius:var(--radius-sm); background:transparent; font-family:inherit; font-size:13px; font-weight:500; color:var(--text-light); cursor:pointer; transition:all 0.12s; width:fit-content; }
  .btn-add-doc:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
  .btn-remove-doc { width:26px; height:26px; border-radius:var(--radius-sm); border:none; background:transparent; cursor:pointer; color:var(--text-light); display:flex; align-items:center; justify-content:center; transition:all 0.12s; flex-shrink:0; }
  .btn-remove-doc:hover { background:var(--red-bg); color:var(--red); }

  .btn-cancel { padding:9px 16px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); font-family:inherit; font-size:13.5px; font-weight:500; color:var(--text-mid); cursor:pointer; transition:all 0.12s; }
  .btn-cancel:hover { border-color:var(--text-light); color:var(--text); }
  .btn-submit { padding:9px 20px; background:var(--accent); border:none; border-radius:var(--radius-sm); font-family:inherit; font-size:13.5px; font-weight:600; color:white; cursor:pointer; transition:all 0.15s; }
  .btn-submit:hover { background:var(--accent-dark); }

  /* Toast */
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--text); color:white; padding:11px 20px; border-radius:var(--radius-sm); font-size:13.5px; font-weight:500; box-shadow:var(--shadow-xl); z-index:200; opacity:0; transition:all 0.25s; }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo-area">
    <div class="logo-sq">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </div>
    <span class="logo-text">ComNet</span>
  </div>
  <div class="nav-links">
    <a class="nav-link active" href="items.html">Майно</a>
    <a class="nav-link" href="database.html">Переміщення</a>
    <a class="nav-link" href="residues.html">Залишки</a>
    <a class="nav-link" href="#">Звіти</a>
    <a class="nav-link" href="#">Документи</a>
    <a class="nav-link" href="#">Налаштування</a>
  </div>
  <div class="tb-right">
    <div class="tb-search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-light);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="search-input" placeholder="Пошук за назвою, №, серійним..." oninput="renderTable()">
    </div>
    <button class="btn-primary" onclick="openFormModal(null)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Додати
    </button>
    <div class="user-pill"><div class="user-dot">ОП</div><span>Оператор</span></div>
  </div>
</div>

<!-- CONTENT -->
<div class="content-scroll">
  <div class="tile">
    <div class="tile-header">
      <span class="tile-title">Довідник майна</span>
      <span class="tile-count" id="tile-count">0</span>
      <div class="tile-tabs">
        <button class="tt-btn on" onclick="setTab('all',this)">Всі <span class="c" id="c-all">0</span></button>
        <button class="tt-btn" onclick="setTab('serial',this)">Серійні <span class="c" id="c-serial">0</span></button>
        <button class="tt-btn" onclick="setTab('nonserial',this)">Несерійні <span class="c" id="c-nonserial">0</span></button>
      </div>
    </div>
    <div class="sub-row">
      <span class="sub-row-label">Тип</span>
      <div class="sub-chips" id="type-chips"></div>
      <span class="sub-clear" id="sub-clear" onclick="clearType()" style="display:none">× Скинути</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>

// ── HELPERS ──────────────────────────────────────────────────────
function catClass(c) {
  if (!c) return '';
  if (c === 'пр.')   return 'cat-pr';
  if (c === 'непр.') return 'cat-npr';
  return 'cat-' + c;
}

function fmtPrice(v) {
  if (!v && v !== 0) return '—';
  return Number(v).toLocaleString('uk-UA', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y}`;
}

function getTypes() {
  const s = new Set();
  items.forEach(it => { if (it.type) s.add(it.type); });
  return [...s].sort();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  return items.filter(it => {
    if (activeTab === 'serial'    && !it.serial) return false;
    if (activeTab === 'nonserial' &&  it.serial) return false;
    if (activeType && it.type !== activeType) return false;
    if (q && ![it.name, it.number, it.serial||'', it.type||'', it.nomenclature||''].some(v => v.toLowerCase().includes(q))) return false;
    return true;
  });
}

// ── RENDER TABLE ─────────────────────────────────────────────────
function renderTypeChips() {
  const wrap = document.getElementById('type-chips');
  wrap.textContent = '';
  getTypes().forEach(t => {
    const cnt = items.filter(it => it.type === t).length;
    const chip = document.createElement('div');
    chip.className = 'sub-chip' + (activeType === t ? ' on' : '');
    chip.textContent = t;
    chip.onclick = () => { activeType = activeType === t ? null : t; renderTypeChips(); renderTable(); };
    wrap.appendChild(chip);
  });
  document.getElementById('sub-clear').style.display = activeType ? '' : 'none';
}

function clearType() { activeType = null; renderTypeChips(); renderTable(); }

function renderTable() {
  const filtered = getFiltered();
  const tbody = document.getElementById('items-tbody');
  tbody.textContent = '';

  const serialCnt    = items.filter(it =>  it.serial).length;
  const nonserialCnt = items.filter(it => !it.serial).length;
  document.getElementById('tile-count').textContent   = filtered.length;
  document.getElementById('c-all').textContent        = items.length;
  document.getElementById('c-serial').textContent     = serialCnt;
  document.getElementById('c-nonserial').textContent  = nonserialCnt;

  filtered.forEach(it => {
    const tr = document.createElement('tr');
    tr.onclick = (e) => { if (!e.target.closest('.acts')) openCard(it.id); };

    // № картки
    const tdNum = document.createElement('td');
    const numBadge = document.createElement('span');
    numBadge.className = 'td-num-badge';
    numBadge.textContent = it.number;
    tdNum.appendChild(numBadge);
    tr.appendChild(tdNum);

    // Найменування
    const tdName = document.createElement('td');
    const nameSpan = document.createElement('span');
    nameSpan.className = 'td-name';
    nameSpan.textContent = it.name;
    tdName.appendChild(nameSpan);
    tr.appendChild(tdName);

    // Тип
    const tdType = document.createElement('td');
    if (it.type) {
      const chip = document.createElement('span');
      chip.className = 'type-chip';
      chip.textContent = it.type;
      tdType.appendChild(chip);
    } else {
      tdType.textContent = '—';
    }
    tr.appendChild(tdType);

    // Серійний №
    const tdSerial = document.createElement('td');
    const serialSpan = document.createElement('span');
    serialSpan.className = it.serial ? 'td-serial' : 'td-serial none';
    serialSpan.textContent = it.serial || 'несерійне';
    tdSerial.appendChild(serialSpan);
    tr.appendChild(tdSerial);

    // Категорія
    const tdCat = document.createElement('td');
    if (it.cat) {
      const badge = document.createElement('span');
      badge.className = 'cat-badge ' + catClass(it.cat);
      badge.textContent = it.cat;
      tdCat.appendChild(badge);
    } else {
      tdCat.textContent = '—';
    }
    tr.appendChild(tdCat);

    // Одиниця виміру
    const tdUom = document.createElement('td');
    tdUom.className = 'td-mono';
    tdUom.style.textAlign = 'center';
    tdUom.textContent = it.uom || '—';
    tr.appendChild(tdUom);

    // Кількість
    const tdQty = document.createElement('td');
    tdQty.className = 'td-num-val' + (it.qty > 1 ? ' td-qty-large' : '');
    tdQty.textContent = it.qty;
    tr.appendChild(tdQty);

    // Вартість
    const tdPrice = document.createElement('td');
    tdPrice.className = 'td-num-val';
    tdPrice.textContent = fmtPrice(it.price);
    tr.appendChild(tdPrice);

    // Дії
    const tdActs = document.createElement('td');
    const acts = document.createElement('div');
    acts.className = 'acts';

    const btnE = document.createElement('button');
    btnE.className = 'act e'; btnE.title = 'Редагувати';
    btnE.onclick = (e) => { e.stopPropagation(); openFormModal(it.id); };
    const svgE = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgE.setAttribute('viewBox','0 0 24 24'); svgE.setAttribute('fill','none'); svgE.setAttribute('stroke','currentColor'); svgE.setAttribute('stroke-width','2');
    const pE1 = document.createElementNS('http://www.w3.org/2000/svg','path'); pE1.setAttribute('d','M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7');
    const pE2 = document.createElementNS('http://www.w3.org/2000/svg','path'); pE2.setAttribute('d','M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z');
    svgE.appendChild(pE1); svgE.appendChild(pE2); btnE.appendChild(svgE);

    const btnD = document.createElement('button');
    btnD.className = 'act d'; btnD.title = 'Видалити';
    btnD.onclick = (e) => { e.stopPropagation(); deleteItem(it.id); };
    const svgD = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgD.setAttribute('viewBox','0 0 24 24'); svgD.setAttribute('fill','none'); svgD.setAttribute('stroke','currentColor'); svgD.setAttribute('stroke-width','2');
    const pl = document.createElementNS('http://www.w3.org/2000/svg','polyline'); pl.setAttribute('points','3 6 5 6 21 6');
    const pD = document.createElementNS('http://www.w3.org/2000/svg','path'); pD.setAttribute('d','M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2');
    svgD.appendChild(pl); svgD.appendChild(pD); btnD.appendChild(svgD);

    acts.appendChild(btnE); acts.appendChild(btnD); tdActs.appendChild(acts);
    tr.appendChild(tdActs);
    tbody.appendChild(tr);
  });

  const foot = document.getElementById('t-foot');
  foot.textContent = '';
  const b1 = document.createElement('b'); b1.textContent = filtered.length;
  const b2 = document.createElement('b'); b2.textContent = items.length;
  foot.appendChild(document.createTextNode('Показано '));
  foot.appendChild(b1);
  foot.appendChild(document.createTextNode(' з '));
  foot.appendChild(b2);
  foot.appendChild(document.createTextNode(' позицій'));
}

function setTab(t, btn) {
  activeTab = t;
  document.querySelectorAll('.tt-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderTable();
}

function deleteItem(id) {
  items = items.filter(it => it.id !== id);
  renderTypeChips(); renderTable();
  showToast('Позицію видалено');
}

function openCard(id) {
  const it = items.find(x => x.id === id);
  if (!it) return;

  document.getElementById('card-num').textContent = '№ ' + it.number;
  document.getElementById('card-name').textContent = it.name;

  // Badges
  const badges = document.getElementById('card-badges');
  badges.textContent = '';
  if (it.cat) {
    const b = document.createElement('span');
    b.className = 'cat-badge ' + catClass(it.cat);
    b.textContent = it.cat + ' кат.';
    badges.appendChild(b);
  }
  if (it.type) {
    const b = document.createElement('span');
    b.className = 'type-chip';
    b.textContent = it.type;
    badges.appendChild(b);
  }
  if (it.serial) {
    const b = document.createElement('span');
    b.className = 'type-chip';
    b.style.fontFamily = "'DM Mono',monospace";
    b.style.fontSize = '11.5px';
    b.textContent = 'Серійне';
    badges.appendChild(b);
  }

  document.getElementById('card-edit-btn').onclick = () => { closeCard(); openFormModal(id); };

  // Body
  const body = document.getElementById('card-body');
  body.textContent = '';

  // Fields grid
  const fields = [
    ['Код номенклатури', it.nomenclature || '—', true],
    ['Одиниця виміру', it.uom || '—', false],
    ['Кількість', it.qty != null ? it.qty : '—', false],
    ['Вартість', it.price ? fmtPrice(it.price) + ' грн' : '—', false],
    ['Серійний номер', it.serial || 'несерійне', it.serial],
    ['Документ надходження (batch)', it.batch || '—', true],
  ];

  const section1 = document.createElement('div');
  const s1title = document.createElement('div');
  s1title.className = 'card-section-title';
  s1title.textContent = 'Характеристики';
  const grid = document.createElement('div');
  grid.className = 'card-fields';
  fields.forEach(([label, value, mono]) => {
    const field = document.createElement('div');
    field.className = 'card-field';
    const lEl = document.createElement('div'); lEl.className = 'card-field-label'; lEl.textContent = label;
    const vEl = document.createElement('div');
    vEl.className = 'card-field-value' + (mono ? ' mono' : '') + (value === 'несерійне' ? ' dim' : '');
    vEl.textContent = value;
    field.appendChild(lEl); field.appendChild(vEl);
    grid.appendChild(field);
  });
  section1.appendChild(s1title);
  section1.appendChild(grid);
  body.appendChild(section1);

  // Notes
  if (it.notes) {
    const hr = document.createElement('hr'); hr.className = 'card-divider';
    body.appendChild(hr);
    const notesSection = document.createElement('div');
    const ntitle = document.createElement('div'); ntitle.className = 'card-section-title'; ntitle.textContent = 'Примітки';
    const nval = document.createElement('div'); nval.style.cssText = 'font-size:14px;color:var(--text-mid);line-height:1.5;'; nval.textContent = it.notes;
    notesSection.appendChild(ntitle); notesSection.appendChild(nval);
    body.appendChild(notesSection);
  }

  // Documents
  const hr2 = document.createElement('hr'); hr2.className = 'card-divider';
  body.appendChild(hr2);
  const docsSection = document.createElement('div');
  const dtitle = document.createElement('div'); dtitle.className = 'card-section-title'; dtitle.textContent = 'Прикріплені документи';
  docsSection.appendChild(dtitle);
  if (it.docs && it.docs.length > 0) {
    const docList = document.createElement('div'); docList.className = 'doc-list';
    it.docs.forEach(d => {
      const card = document.createElement('div'); card.className = 'doc-card';
      const dtype = document.createElement('div'); dtype.className = 'doc-card-type'; dtype.textContent = DOC_TYPE_LABELS[d.type] || d.type;
      const dnum  = document.createElement('div'); dnum.className  = 'doc-card-num';  dnum.textContent  = d.num;
      const ddate = document.createElement('div'); ddate.className = 'doc-card-date'; ddate.textContent = fmtDate(d.date);
      card.appendChild(dtype); card.appendChild(dnum); card.appendChild(ddate);
      docList.appendChild(card);
    });
    docsSection.appendChild(docList);
  } else {
    const empty = document.createElement('div'); empty.className = 'doc-empty'; empty.textContent = 'Документи не прикріплено';
    docsSection.appendChild(empty);
  }
  body.appendChild(docsSection);

  document.getElementById('card-overlay').classList.add('open');
}

function closeCard() { document.getElementById('card-overlay').classList.remove('open'); }
function handleCardOverlay(e) { if (e.target.id === 'card-overlay') closeCard(); }

// ── FORM (ADD/EDIT) ───────────────────────────────────────────────
function setSerial(val) {
  formIsSerial = val;
  document.getElementById('opt-serial').classList.toggle('on', val);
  document.getElementById('opt-nonserial').classList.toggle('on', !val);
  document.getElementById('serial-group').style.display = val ? '' : 'none';
  const qtyInput = document.getElementById('f-qty');
  const qtyLabel = document.getElementById('qty-label');
  if (val) {
    qtyInput.value = '1';
    qtyInput.disabled = true;
    qtyLabel.textContent = 'Кількість (серійне = 1)';
  } else {
    qtyInput.disabled = false;
    qtyLabel.textContent = 'Кількість';
  }
}

function addDocRow(doc) {
  const row = document.createElement('div');
  row.className = 'doc-form-row';

  const sel = document.createElement('select');
  sel.className = 'form-select';
  sel.style.fontSize = '12.5px';
  Object.entries(DOC_TYPE_LABELS).forEach(([val, label]) => {
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = label;
    sel.appendChild(opt);
  });
  if (doc) sel.value = doc.type;

  const numIn = document.createElement('input');
  numIn.className = 'form-input';
  numIn.placeholder = '№ документа';
  numIn.style.fontSize = '12.5px';
  if (doc) numIn.value = doc.num;

  const dateIn = document.createElement('input');
  dateIn.type = 'date';
  dateIn.className = 'form-input';
  dateIn.style.fontSize = '12.5px';
  if (doc) dateIn.value = doc.date;

  const btnRm = document.createElement('button');
  btnRm.className = 'btn-remove-doc';
  btnRm.title = 'Видалити';
  btnRm.type = 'button';
  const svgRm = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgRm.setAttribute('viewBox','0 0 24 24'); svgRm.setAttribute('fill','none'); svgRm.setAttribute('stroke','currentColor'); svgRm.setAttribute('stroke-width','2.5'); svgRm.style.width='12px'; svgRm.style.height='12px';
  const l1 = document.createElementNS('http://www.w3.org/2000/svg','line'); l1.setAttribute('x1','18'); l1.setAttribute('y1','6'); l1.setAttribute('x2','6'); l1.setAttribute('y2','18');
  const l2 = document.createElementNS('http://www.w3.org/2000/svg','line'); l2.setAttribute('x1','6'); l2.setAttribute('y1','6'); l2.setAttribute('x2','18'); l2.setAttribute('y2','18');
  svgRm.appendChild(l1); svgRm.appendChild(l2); btnRm.appendChild(svgRm);
  btnRm.onclick = () => row.remove();

  row.appendChild(sel); row.appendChild(numIn); row.appendChild(dateIn); row.appendChild(btnRm);
  document.getElementById('doc-form-list').appendChild(row);
}

function collectDocs() {
  const rows = document.querySelectorAll('#doc-form-list .doc-form-row');
  const docs = [];
  rows.forEach(row => {
    const [sel, numIn, dateIn] = row.querySelectorAll('select, input');
    if (numIn.value.trim()) docs.push({ type: sel.value, num: numIn.value.trim(), date: dateIn.value });
  });
  return docs;
}

function openFormModal(id) {
  editItemId = id;
  document.getElementById('form-title').textContent = id ? 'Редагувати позицію' : 'Додати позицію';
  document.getElementById('doc-form-list').textContent = '';

  if (id) {
    const it = items.find(x => x.id === id);
    setSerial(!!it.serial);
    document.getElementById('f-number').value     = it.number || '';
    document.getElementById('f-name').value       = it.name || '';
    document.getElementById('f-type').value       = it.type || '';
    document.getElementById('f-cat').value        = it.cat || '';
    document.getElementById('f-nomenclature').value = it.nomenclature || '';
    document.getElementById('f-uom').value        = it.uom || '';
    document.getElementById('f-qty').value        = it.qty != null ? it.qty : '';
    document.getElementById('f-price').value      = it.price != null ? it.price : '';
    document.getElementById('f-serial').value     = it.serial || '';
    document.getElementById('f-batch').value      = it.batch || '';
    document.getElementById('f-notes').value      = it.notes || '';
    (it.docs || []).forEach(d => addDocRow(d));
  } else {
    setSerial(true);
    ['f-number','f-name','f-type','f-nomenclature','f-uom','f-price','f-serial','f-batch','f-notes'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-cat').value = '';
    document.getElementById('f-qty').value = '1';
  }

  document.getElementById('form-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-number').focus(), 100);
}

function closeForm() { document.getElementById('form-overlay').classList.remove('open'); }
function handleFormOverlay(e) { if (e.target.id === 'form-overlay') closeForm(); }

function submitForm() {
  const number = document.getElementById('f-number').value.trim();
  const name   = document.getElementById('f-name').value.trim();
  if (!number || !name) {
    ['f-number','f-name'].forEach(fid => {
      const el = document.getElementById(fid);
      if (!el.value.trim()) { el.style.outline = '2px solid var(--red)'; setTimeout(() => el.style.outline='', 2000); }
    });
    return;
  }
  const data = {
    number,
    name,
    type:          document.getElementById('f-type').value.trim(),
    cat:           document.getElementById('f-cat').value,
    nomenclature:  document.getElementById('f-nomenclature').value.trim(),
    uom:           document.getElementById('f-uom').value.trim() || 'шт',
    qty:           formIsSerial ? 1 : (parseFloat(document.getElementById('f-qty').value) || 1),
    price:         parseFloat(document.getElementById('f-price').value) || null,
    serial:        formIsSerial ? document.getElementById('f-serial').value.trim() || null : null,
    batch:         document.getElementById('f-batch').value.trim(),
    notes:         document.getElementById('f-notes').value.trim(),
    docs:          collectDocs(),
  };
  if (editItemId) {
    const it = items.find(x => x.id === editItemId);
    if (it) Object.assign(it, data);
    showToast('Збережено');
  } else {
    items.push({ id: ++nextId, ...data });
    showToast('Позицію додано');
  }
  closeForm();
  renderTypeChips();
  renderTable();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCard(); closeForm(); }
});

renderTypeChips();
renderTable();
</script>
</body>
</html>
