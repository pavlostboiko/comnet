<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComNet — Залишки</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0; --border-light:#f1f5f9;
    --text:#0f172a; --text-mid:#475569; --text-light:#94a3b8;
    --accent:#475569; --accent-light:#e2e8f0; --accent-dark:#334155;
    --accent-soft:rgba(71,85,105,0.08); --accent-ring:rgba(71,85,105,0.18);
    --row-hover:#f1f5f9;
    --shadow:0 1px 3px rgba(15,23,42,0.06),0 0 0 1px rgba(15,23,42,0.04);
    --radius:4px; --radius-sm:3px; --radius-pill:6px;
    --font-body:13.5px; --font-mono:12px; --font-header:11px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* TOPBAR */
  .topbar { height:54px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:0; flex-shrink:0; }
  .logo-area { display:flex; align-items:center; gap:9px; margin-right:32px; }
  .logo-sq { width:28px; height:28px; background:var(--accent); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; }
  .logo-text { font-size:15px; font-weight:700; letter-spacing:-0.02em; }
  .nav-links { display:flex; align-items:stretch; height:100%; }
  .nav-link { display:flex; align-items:center; padding:0 14px; font-size:14px; font-weight:500; color:var(--text-mid); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; text-decoration:none; }
  .nav-link:hover { color:var(--text); }
  .nav-link.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  .tb-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .user-pill { display:flex; align-items:center; gap:6px; padding:4px 10px 4px 5px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-pill); }
  .user-dot { width:24px; height:24px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9.5px; font-weight:700; color:white; }
  .user-pill span { font-size:13px; font-weight:500; color:var(--text-mid); }

  /* CONTENT — scrolls only horizontally at table level */
  .content-scroll { flex:1; overflow-y:auto; padding:20px 24px; }
  .content-scroll::-webkit-scrollbar { width:6px; }
  .content-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* TILE */
  .tile { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; animation:tileIn 0.3s ease-out both; }
  @keyframes tileIn { from { opacity:0; transform:translateY(6px); } }
  .tile-header { padding:12px 20px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border-light); flex-wrap:wrap; }
  .tile-title { font-size:15px; font-weight:700; }
  .tile-count { font-family:'DM Mono',monospace; font-size:11.5px; font-weight:500; background:var(--accent-light); color:var(--accent); padding:2px 8px; border-radius:var(--radius-sm); }
  .tile-desc { font-size:13px; color:var(--text-light); margin-left:4px; }

  /* CATEGORY CHIPS */
  .sub-row { padding:9px 20px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border-light); background:var(--bg); flex-wrap:wrap; }
  .sub-row-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-light); flex-shrink:0; }
  .sub-chips { display:flex; gap:6px; flex-wrap:wrap; }
  .sub-chip { padding:4px 11px; border:1px solid var(--border); background:var(--surface); border-radius:var(--radius-pill); font-size:12.5px; font-weight:500; color:var(--text-mid); cursor:pointer; transition:all 0.12s; }
  .sub-chip:hover { border-color:var(--text-light); color:var(--text); }
  .sub-chip.on { background:var(--accent); border-color:var(--accent); color:white; font-weight:600; }

  /* MATRIX TABLE */
  .table-wrap { overflow-x:auto; }
  .table-wrap::-webkit-scrollbar { height:7px; }
  .table-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  table { border-collapse:collapse; }
  /* sticky header row */
  thead tr { background:var(--bg); }
  th {
    padding:10px 14px; text-align:right;
    font-size:var(--font-header); font-weight:600; text-transform:uppercase; letter-spacing:0.07em;
    color:var(--text-light); border-bottom:1px solid var(--border);
    white-space:nowrap; user-select:none;
  }
  th.th-item { text-align:left; min-width:220px; padding-left:20px; background:var(--bg); }
  th.th-uom  { text-align:center; width:60px; }
  th.th-cat  { text-align:center; width:72px; }
  th.th-unit { width:90px; }
  th.th-total { background:var(--accent-light); color:var(--accent); width:90px; }

  /* sticky first column */
  td.td-item {
    position:sticky; left:0; z-index:1;
    background:var(--surface);
    padding:9px 16px 9px 20px;
    font-size:var(--font-body); font-weight:500; color:var(--text);
    border-right:1px solid var(--border-light);
    min-width:220px; max-width:280px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  tr:nth-child(even) td.td-item { background:#f8fafc; }
  tr:hover td.td-item { background:var(--row-hover) !important; }

  /* sticky even-row bg for first column */
  tbody tr:nth-child(even) { background:#f8fafc; }
  tbody tr:hover { background:var(--row-hover) !important; }

  td {
    padding:9px 14px; font-size:var(--font-body); color:var(--text-mid);
    vertical-align:middle; border-bottom:1px solid var(--border-light);
    white-space:nowrap;
  }
  tbody tr:last-child td { border-bottom:none; }

  td.td-uom { text-align:center; font-family:'DM Mono',monospace; font-size:11.5px; color:var(--text-light); }
  td.td-cat { text-align:center; }
  .cat-badge { display:inline-block; padding:2px 8px; border-radius:var(--radius-sm); font-size:11px; font-weight:600; font-family:'DM Mono',monospace; }
  .cat-1 { background:#eff6ff; color:#2563eb; }
  .cat-2 { background:#ecfdf5; color:#059669; }
  .cat-3 { background:#fef9c3; color:#a16207; }
  .cat-pr  { background:#f0fdf4; color:#16a34a; }
  .cat-npr { background:#fef2f2; color:#dc2626; }

  td.td-qty {
    text-align:right; font-family:'DM Mono',monospace;
    font-size:var(--font-mono); color:var(--text);
    font-variant-numeric:tabular-nums;
  }
  td.td-qty.zero { color:var(--text-light); font-weight:400; }
  td.td-qty.pos  { color:var(--text); font-weight:600; }

  /* total column */
  td.td-total {
    text-align:right; font-family:'DM Mono',monospace;
    font-size:var(--font-mono); font-weight:700; color:var(--accent);
    background:rgba(71,85,105,0.05);
    font-variant-numeric:tabular-nums;
  }
  /* total row */
  tr.tr-total td { border-top:2px solid var(--border); font-weight:700; font-size:var(--font-body); }
  tr.tr-total td.td-item { color:var(--accent); background:rgba(71,85,105,0.05) !important; }
  tr.tr-total td.td-qty { color:var(--accent); background:rgba(71,85,105,0.05); }
  tr.tr-total td.td-total { background:var(--accent-light); color:var(--accent-dark); }
  tr.tr-total td.td-uom, tr.tr-total td.td-cat { background:rgba(71,85,105,0.05); }

  /* Footer */
  .t-foot { padding:10px 20px; border-top:1px solid var(--border-light); font-size:13px; color:var(--text-light); display:flex; align-items:center; gap:16px; background:var(--bg); }
  .t-foot b { color:var(--text); font-weight:600; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo-area">
    <div class="logo-sq">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </div>
    <span class="logo-text">ComNet</span>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="items.html">Майно</a>
    <a class="nav-link" href="database.html">Переміщення</a>
    <a class="nav-link active" href="residues.html">Залишки</a>
    <a class="nav-link" href="#">Звіти</a>
    <a class="nav-link" href="#">Документи</a>
    <a class="nav-link" href="#">Налаштування</a>
  </div>
  <div class="tb-right">
    <div class="user-pill"><div class="user-dot">ОП</div><span>Оператор</span></div>
  </div>
</div>

<!-- CONTENT -->
<div class="content-scroll">
  <div class="tile">
    <div class="tile-header">
      <span class="tile-title">Залишки по підрозділах</span>
      <span class="tile-count" id="tile-count">0</span>
      <span class="tile-desc" id="tile-date"></span>
    </div>
    <div class="sub-row">
      <span class="sub-row-label">Категорія</span>
      <div class="sub-chips" id="cat-chips"></div>
    </div>
    <div class="table-wrap">
      <table id="matrix-table">
        <thead id="matrix-head"></thead>
        <tbody id="matrix-body"></tbody>
      </table>
    </div>
    <div class="t-foot" id="t-foot"></div>
  </div>
</div>

<script>
const UNITS = ["1 рота","2 рота","3 рота","4 рота","5 рота","Штаб"];

// [item_name, uom, category, [qty per unit in UNITS order]]
const ALL_ITEMS = [
  ["Бронежилет 6Б45",         "шт",     "1",    [8,  7,  6,  6,  3,  0]],
  ["Бронежилет 6Б23-1",       "шт",     "пр.",  [3,  0,  2,  0,  0,  5]],
  ["Автомат АК-74М",          "шт",     "1",    [6,  7,  5,  0,  0,  7]],
  ["Пістолет ПМ",             "шт",     "1",    [2,  2,  2,  2,  2,  4]],
  ["Каска М21-С",             "шт",     "1",    [8,  6,  6,  6,  4,  22]],
  ["Каска М21-С",             "шт",     "непр.",[1,  0,  0,  2,  0,  0]],
  ["Рюкзак тактичний",        "шт",     "2",    [0,  12, 10, 8,  6,  28]],
  ["Мішок спальний зим.",     "шт",     "2",    [8,  8,  6,  6,  4,  10]],
  ["Мішок спальний літ.",     "шт",     "2",    [6,  6,  5,  5,  3,  8]],
  ["Плащ-намет",              "шт",     "1",    [8,  7,  6,  6,  4,  5]],
  ["Аптечка IFAK",            "шт",     "1",    [20, 0,  15, 15, 0,  70]],
  ["Турнікет CAT",            "шт",     "1",    [40, 0,  0,  40, 0,  120]],
  ["Радіостанція Р-187-П1",   "шт",     "1",    [3,  3,  0,  0,  0,  9]],
  ["Радіостанція Р-187-П1",   "шт",     "пр.",  [0,  0,  1,  1,  0,  2]],
  ["Бінокль БПЦ-10х",        "шт",     "2",    [1,  1,  1,  1,  0,  2]],
  ["Ліхтар тактичний",       "шт",     "1",    [8,  7,  6,  6,  4,  10]],
  ["Генератор 2 кВт",         "шт",     "2",    [0,  0,  1,  1,  0,  0]],
  ["Аптечка групова",         "шт",     "1",    [2,  2,  2,  2,  1,  3]],
  ["Нічний монокуляр",        "шт",     "1",    [0,  1,  0,  1,  0,  2]],
  ["Комплект НВП",            "компл.", "2",    [4,  4,  3,  3,  2,  5]],
];

const ALL_CATS = ["1","2","3","пр.","непр."];
let selectedCat = null;

function catClass(c) {
  if (c === 'пр.')   return 'cat-pr';
  if (c === 'непр.') return 'cat-npr';
  return 'cat-' + c;
}

function getVisible() {
  if (!selectedCat) return ALL_ITEMS;
  return ALL_ITEMS.filter(it => it[2] === selectedCat);
}

function renderChips() {
  const wrap = document.getElementById('cat-chips');
  wrap.textContent = '';

  const all = document.createElement('div');
  all.className = 'sub-chip' + (!selectedCat ? ' on' : '');
  all.textContent = 'Всі';
  all.onclick = () => { selectedCat = null; renderChips(); renderMatrix(); };
  wrap.appendChild(all);

  ALL_CATS.forEach(c => {
    const exists = ALL_ITEMS.some(it => it[2] === c);
    if (!exists) return;
    const chip = document.createElement('div');
    chip.className = 'sub-chip' + (selectedCat === c ? ' on' : '');
    chip.textContent = c;
    chip.onclick = () => { selectedCat = selectedCat === c ? null : c; renderChips(); renderMatrix(); };
    wrap.appendChild(chip);
  });
}

function renderMatrix() {
  const items = getVisible();
  const thead = document.getElementById('matrix-head');
  const tbody = document.getElementById('matrix-body');
  thead.textContent = '';
  tbody.textContent = '';

  document.getElementById('tile-count').textContent = items.length;
  document.getElementById('tile-date').textContent = 'станом на 01.05.2025';

  // Build header
  const headTr = document.createElement('tr');
  const thItem = document.createElement('th'); thItem.className='th-item'; thItem.textContent='Найменування майна'; headTr.appendChild(thItem);
  const thUom  = document.createElement('th'); thUom.className='th-uom';  thUom.textContent='Од.';      headTr.appendChild(thUom);
  const thCat  = document.createElement('th'); thCat.className='th-cat';  thCat.textContent='Кат.';     headTr.appendChild(thCat);
  UNITS.forEach(u => {
    const th = document.createElement('th');
    th.className = 'th-unit';
    th.textContent = u;
    headTr.appendChild(th);
  });
  const thTot = document.createElement('th'); thTot.className='th-unit th-total'; thTot.textContent='ВСЬОГО'; headTr.appendChild(thTot);
  thead.appendChild(headTr);

  // Unit totals for footer
  const unitSums = new Array(UNITS.length).fill(0);
  let grandTotal = 0;

  items.forEach(it => {
    const [name, uom, cat, qtys] = it;
    const rowTotal = qtys.reduce((a, b) => a + b, 0);
    qtys.forEach((q, i) => { unitSums[i] += q; });
    grandTotal += rowTotal;

    const tr = document.createElement('tr');

    const tdItem = document.createElement('td');
    tdItem.className = 'td-item';
    tdItem.textContent = name;
    tdItem.title = name;
    tr.appendChild(tdItem);

    const tdUom = document.createElement('td');
    tdUom.className = 'td-uom';
    tdUom.textContent = uom;
    tr.appendChild(tdUom);

    const tdCat = document.createElement('td');
    tdCat.className = 'td-cat';
    const badge = document.createElement('span');
    badge.className = 'cat-badge ' + catClass(cat);
    badge.textContent = cat;
    tdCat.appendChild(badge);
    tr.appendChild(tdCat);

    qtys.forEach(q => {
      const td = document.createElement('td');
      td.className = 'td-qty' + (q > 0 ? ' pos' : ' zero');
      td.textContent = q > 0 ? q : '—';
      tr.appendChild(td);
    });

    const tdTot = document.createElement('td');
    tdTot.className = 'td-total';
    tdTot.textContent = rowTotal > 0 ? rowTotal : '—';
    tr.appendChild(tdTot);

    tbody.appendChild(tr);
  });

  // Total row
  const trTot = document.createElement('tr');
  trTot.className = 'tr-total';

  const tdTotLabel = document.createElement('td');
  tdTotLabel.className = 'td-item';
  tdTotLabel.textContent = 'ВСЬОГО';
  trTot.appendChild(tdTotLabel);

  const tdTotUom = document.createElement('td'); tdTotUom.className='td-uom'; tdTotUom.textContent=''; trTot.appendChild(tdTotUom);
  const tdTotCat = document.createElement('td'); tdTotCat.className='td-cat'; tdTotCat.textContent=''; trTot.appendChild(tdTotCat);

  unitSums.forEach(s => {
    const td = document.createElement('td');
    td.className = 'td-qty' + (s > 0 ? ' pos' : ' zero');
    td.textContent = s > 0 ? s : '—';
    trTot.appendChild(td);
  });

  const tdGrand = document.createElement('td');
  tdGrand.className = 'td-total';
  tdGrand.textContent = grandTotal;
  trTot.appendChild(tdGrand);

  tbody.appendChild(trTot);

  // Footer
  const foot = document.getElementById('t-foot');
  foot.textContent = '';
  const b1 = document.createElement('b'); b1.textContent = items.length;
  const b2 = document.createElement('b'); b2.textContent = ALL_ITEMS.length;
  const b3 = document.createElement('b'); b3.textContent = grandTotal;
  foot.appendChild(document.createTextNode('Показано '));
  foot.appendChild(b1);
  foot.appendChild(document.createTextNode(' з '));
  foot.appendChild(b2);
  foot.appendChild(document.createTextNode(' позицій · Загальна кількість: '));
  foot.appendChild(b3);
  foot.appendChild(document.createTextNode(' од.'));
}

renderChips();
renderMatrix();
</script>
</body>
</html>
