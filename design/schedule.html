<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARSH — Графік</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f8fafc; --surface:#fff; --border:#e2e8f0; --border-light:#f1f5f9;
    --text:#0f172a; --text-mid:#475569; --text-light:#94a3b8;
    --accent:#475569; --accent-light:#e2e8f0; --accent-dark:#334155;
    --accent-soft:rgba(71,85,105,0.08); --accent-ring:rgba(71,85,105,0.18);
    --row-hover:#f1f5f9;
    --amber:#f59e0b; --amber-bg:#fffbeb;
    --red:#ef4444;
    --dep-bg:#fce7f3; --dep-text:#9f1239;
    --vr-bg:#fed7aa; --vr-text:#9a3412;
    --shadow:0 1px 3px rgba(15,23,42,0.06),0 0 0 1px rgba(15,23,42,0.04);
    --radius:4px; --radius-sm:3px; --radius-pill:6px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  .topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;flex-shrink:0}
  .logo-area{display:flex;align-items:center;gap:9px;margin-right:32px}
  .logo-sq{width:28px;height:28px;background:var(--accent);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}
  .logo-text{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
  .nav-links{display:flex;align-items:stretch;height:100%}
  .nav-link{display:flex;align-items:center;gap:6px;padding:0 14px;font-size:14px;font-weight:500;color:var(--text-mid);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-decoration:none}
  .nav-link:hover{color:var(--text)}
  .nav-link.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .nav-link .cnt{font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500;background:var(--accent-light);color:var(--accent);padding:1px 6px;border-radius:var(--radius-sm)}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .legend{display:flex;align-items:center;gap:12px;padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm)}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text-mid)}
  .legend-dot{width:10px;height:10px;border-radius:2px}
  .legend-dep{background:var(--dep-bg);border:1px solid #fbcfe8}
  .legend-vr{background:var(--vr-bg);border:1px solid #fed7aa}
  .user-pill{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 5px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-pill);cursor:pointer}
  .user-dot{width:24px;height:24px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:#fff}
  .user-pill span{font-size:13px;font-weight:500;color:var(--text-mid)}

  .content-scroll{flex:1;overflow-y:auto;padding:20px 24px}
  .content-scroll::-webkit-scrollbar{width:6px}
  .content-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:tileIn .3s ease-out both}
  @keyframes tileIn{from{opacity:0;transform:translateY(6px)}}
  .tile-header{padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border-light)}
  .tile-title{font-size:15px;font-weight:700;color:var(--text)}
  .tile-sub{font-size:12px;color:var(--text-light)}

  .month-nav{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--bg);padding:3px;border-radius:var(--radius-sm);border:1px solid var(--border-light)}
  .mn-btn{width:26px;height:26px;border:none;background:transparent;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-mid);display:flex;align-items:center;justify-content:center;transition:all .12s}
  .mn-btn:hover{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,0.06)}
  .mn-label{font-size:13px;font-weight:600;color:var(--text);padding:0 10px;min-width:140px;text-align:center;user-select:none}
  .mn-today{padding:4px 10px;border:none;background:var(--surface);border-radius:var(--radius-sm);font-family:inherit;font-size:11.5px;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all .12s;box-shadow:0 1px 2px rgba(0,0,0,0.06)}
  .mn-today:hover{color:var(--accent)}

  .table-wrap{overflow:auto;max-height:calc(100vh - 170px)}
  .table-wrap::-webkit-scrollbar{height:8px;width:8px}
  .table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  table{border-collapse:collapse}
  thead tr{background:var(--bg);position:sticky;top:0;z-index:3}
  th{padding:7px 4px;text-align:center;font-size:10.5px;font-weight:600;color:var(--text-mid);border-bottom:1px solid var(--border);border-right:1px solid var(--border-light);white-space:nowrap;user-select:none;background:var(--bg)}
  th.cv{position:sticky;left:0;z-index:4;padding:7px 12px;text-align:left;min-width:160px;font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-light);font-weight:600;border-right:1px solid var(--border);background:var(--bg)}
  th.cd{position:sticky;left:160px;z-index:4;padding:7px 12px;text-align:left;min-width:150px;font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-light);font-weight:600;border-right:1px solid var(--border);background:var(--bg)}
  th.dh{min-width:36px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);font-weight:600}
  th.dh .dow{display:block;font-size:9.5px;font-weight:500;color:var(--text-light);font-family:'DM Sans',sans-serif;margin-top:1px;text-transform:uppercase;letter-spacing:0.04em}
  th.dh.weekend{background:#fef2f2}
  th.dh.weekend .dow{color:#ef4444}

  tbody tr{transition:background .1s}
  tbody tr.row1-first td{border-top:none}
  tbody tr.row1 td{border-top:2px solid var(--border)}
  td{padding:0;font-size:13px;color:var(--text-mid);vertical-align:middle;border-right:1px solid var(--border-light);border-bottom:1px solid var(--border-light)}
  td.cv{position:sticky;left:0;z-index:2;background:var(--surface);padding:10px 12px;min-width:160px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-direction:column;align-items:flex-start}
  /* fix: cv rowspan */
  tbody tr td.cv{display:table-cell;padding:10px 12px}
  tbody tr td.cv .v-idx{font-family:'DM Mono',monospace;font-size:11.5px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:3px 8px;border-radius:var(--radius-sm);display:inline-block;margin-bottom:4px}
  tbody tr td.cv .v-name{font-size:13px;font-weight:600;color:var(--text);display:block}
  td.cd{position:sticky;left:160px;z-index:2;background:var(--surface);padding:9px 12px;min-width:150px;font-size:12.5px;color:var(--text-mid);font-weight:500;border-right:1px solid var(--border)}
  td.cr-label{position:sticky;left:160px;z-index:2;background:var(--bg);padding:7px 12px;font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;border-right:1px solid var(--border)}

  /* DAY CELL */
  td.dc,td.cr{min-width:36px;max-width:36px;width:36px;height:32px;text-align:center;font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500;cursor:cell;user-select:none;transition:background .1s;padding:0}
  td.dc:hover{background:var(--accent-soft);outline:1px solid var(--accent);outline-offset:-1px;position:relative;z-index:1}
  td.dc.dep{background:var(--dep-bg);color:var(--dep-text);font-weight:600}
  td.dc.vr{background:var(--vr-bg);color:var(--vr-text);font-weight:700}
  td.dc.inactive,td.cr.inactive{background:#f1f5f9;cursor:default;color:var(--text-light);opacity:0.4}
  td.dc.inactive:hover{background:#f1f5f9;outline:none}
  td.cr{background:var(--bg);font-weight:600;color:var(--accent);font-size:10.5px;cursor:default}

  td.dc.editing{padding:0;background:var(--surface);outline:2px solid var(--accent);outline-offset:-2px;position:relative;z-index:5}
  td.dc.editing input{width:100%;height:100%;border:none;padding:0;text-align:center;font-family:'DM Mono',monospace;font-size:11.5px;font-weight:600;color:var(--accent);background:transparent;outline:none;text-transform:uppercase}

  /* weekend columns subtle */
  td.dc.weekend:not(.dep):not(.vr):not(.inactive){background:#fefefe}

  /* today column */
  th.dh.today{background:var(--accent);color:#fff}
  th.dh.today .dow{color:rgba(255,255,255,0.8)}
  td.dc.today:not(.dep):not(.vr):not(.inactive){box-shadow:inset 2px 0 0 var(--accent),inset -2px 0 0 var(--accent)}

  .t-foot{padding:10px 20px;border-top:1px solid var(--border-light);font-size:12.5px;color:var(--text-light);display:flex;align-items:center;gap:16px;background:var(--bg)}
  .t-foot .hint{font-size:12px}
  .t-foot .kbd{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--text-mid);background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 5px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-area">
    <div class="logo-sq"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
    <span class="logo-text">MARSH</span>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="vehicles.html">Автомобілі</a>
    <a class="nav-link" href="routes.html">Маршрути</a>
    <a class="nav-link" href="drivers.html">Водії</a>
    <a class="nav-link" href="departures.html">Виїзди</a>
    <a class="nav-link active" href="schedule.html">Графік</a>
    <a class="nav-link" href="users.html">Користувачі</a>
  </div>
  <div class="tb-right">
    <div class="legend">
      <div class="legend-item"><span class="legend-dot legend-dep"></span>Виїзд</div>
      <div class="legend-item"><span class="legend-dot legend-vr"></span>Вихідний (ВР)</div>
    </div>
    <div class="user-pill"><div class="user-dot">ОП</div><span>Оператор</span></div>
  </div>
</div>

<div class="content-scroll">
  <div class="tile">
    <div class="tile-header">
      <span class="tile-title">Графік виїздів</span>
      <span class="tile-sub">Клік для редагування · Enter/Tab — зберегти · Esc — скасувати</span>
      <div class="month-nav">
        <button class="mn-btn" onclick="prevMonth()" title="Попередній місяць"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
        <span class="mn-label" id="month-label"></span>
        <button class="mn-btn" onclick="nextMonth()" title="Наступний місяць"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
        <button class="mn-today" onclick="goToday()">Сьогодні</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="sched-table"></table>
    </div>
    <div class="t-foot">
      <span class="hint">Введіть маршрутний лист (число) або <span class="kbd">ВР</span> для вихідного</span>
    </div>
  </div>
</div>

<script>
const vehicles = [
  { id:1,  index:'1001W', name:'Nissan Navara',     driver1:{id:1,name:'Іваненко І.І.'},   driver2:{id:2,name:'Петренко П.П.'} },
  { id:2,  index:'1002W', name:'Nissan Navara',     driver1:{id:9,name:'Шевченко В.М.'},   driver2:null },
  { id:3,  index:'1003W', name:'Honda CR-V',        driver1:{id:3,name:'Коваленко О.М.'},  driver2:null },
  { id:4,  index:'1004W', name:'Toyota Hilux',      driver1:{id:4,name:'Мельник А.В.'},    driver2:{id:5,name:'Бондаренко С.Ю.'} },
  { id:5,  index:'1005W', name:'Toyota Hilux',      driver1:{id:6,name:'Сидоренко Д.Р.'},  driver2:null },
  { id:6,  index:'1006W', name:'Toyota Hilux',      driver1:{id:7,name:'Ткаченко О.В.'},   driver2:{id:8,name:'Павленко І.С.'} },
  { id:7,  index:'1007W', name:'Toyota Hilux',      driver1:null,                          driver2:null },
  { id:8,  index:'1008W', name:'Nissan Pathfinder', driver1:{id:10,name:'Кравченко П.І.'}, driver2:null },
  { id:9,  index:'1009W', name:'Man TGE',           driver1:{id:11,name:'Романенко С.В.'}, driver2:null },
  { id:10, index:'1010W', name:'VW Transporter T4', driver1:null,                          driver2:null },
  { id:11, index:'1011W', name:'VW Transporter T5', driver1:{id:12,name:'Луценко А.Д.'},   driver2:null },
  { id:12, index:'1012W', name:'Toyota Hiace',      driver1:{id:13,name:'Лисенко М.С.'},   driver2:null },
  { id:13, index:'1013W', name:'VW Crafter',        driver1:{id:14,name:'Гриценко В.О.'},  driver2:null },
];

const departures = [
  { vehicleId:4,  driverId:4,  routeId:8,  startDate:'2026-03-01', endDate:'' },
  { vehicleId:11, driverId:12, routeId:12, startDate:'2026-03-01', endDate:'2026-03-02' },
  { vehicleId:1,  driverId:1,  routeId:1,  startDate:'2026-03-03', endDate:'' },
  { vehicleId:2,  driverId:9,  routeId:4,  startDate:'2026-03-03', endDate:'2026-03-04' },
  { vehicleId:5,  driverId:6,  routeId:2,  startDate:'2026-03-04', endDate:'' },
  { vehicleId:12, driverId:13, routeId:11, startDate:'2026-03-05', endDate:'2026-03-06' },
  { vehicleId:4,  driverId:5,  routeId:7,  startDate:'2026-03-06', endDate:'' },
  { vehicleId:6,  driverId:7,  routeId:6,  startDate:'2026-03-07', endDate:'' },
  { vehicleId:3,  driverId:3,  routeId:3,  startDate:'2026-03-08', endDate:'' },
  { vehicleId:1,  driverId:2,  routeId:8,  startDate:'2026-03-10', endDate:'' },
  { vehicleId:13, driverId:14, routeId:10, startDate:'2026-03-10', endDate:'2026-03-11' },
  { vehicleId:5,  driverId:6,  routeId:1,  startDate:'2026-03-12', endDate:'' },
  { vehicleId:6,  driverId:8,  routeId:4,  startDate:'2026-03-13', endDate:'' },
  { vehicleId:8,  driverId:10, routeId:2,  startDate:'2026-03-14', endDate:'' },
  { vehicleId:9,  driverId:11, routeId:11, startDate:'2026-03-15', endDate:'2026-03-16' },
  { vehicleId:1,  driverId:1,  routeId:6,  startDate:'2026-03-17', endDate:'' },
  { vehicleId:4,  driverId:4,  routeId:3,  startDate:'2026-03-18', endDate:'' },
  { vehicleId:13, driverId:14, routeId:12, startDate:'2026-03-20', endDate:'2026-03-21' },
  { vehicleId:2,  driverId:9,  routeId:7,  startDate:'2026-03-22', endDate:'' },
  { vehicleId:11, driverId:12, routeId:10, startDate:'2026-03-25', endDate:'2026-03-26' },
];

const routes = [
  {id:1,code:'Л37'},{id:2,code:'Б98'},{id:3,code:'К15'},{id:4,code:'М44'},
  {id:5,code:'С22'},{id:6,code:'В71'},{id:7,code:'Н83'},{id:8,code:'П56'},
  {id:9,code:'Г29'},{id:10,code:'З63'},{id:11,code:'Д18'},{id:12,code:'Х51'},
];

function getRouteCode(vid, iso) {
  const dep = departures.find(d => d.vehicleId === vid && iso >= d.startDate && iso <= (d.endDate || d.startDate));
  if (!dep) return '';
  const r = routes.find(r => r.id === dep.routeId);
  return r ? r.code : '';
}

let scheduleData = {
  '1-1-2026-03-03':'556','1-1-2026-03-17':'569','1-2-2026-03-10':'563',
  '2-1-2026-03-03':'557','2-1-2026-03-04':'557','2-1-2026-03-22':'572',
  '3-1-2026-03-08':'562',
  '4-1-2026-03-01':'554','4-1-2026-03-18':'570','4-2-2026-03-06':'560',
  '5-1-2026-03-04':'558','5-1-2026-03-12':'565',
  '6-1-2026-03-07':'561','6-2-2026-03-13':'566',
  '8-1-2026-03-14':'567',
  '9-1-2026-03-15':'568','9-1-2026-03-16':'568',
  '11-1-2026-03-01':'555','11-1-2026-03-02':'555','11-1-2026-03-25':'573','11-1-2026-03-26':'573',
  '12-1-2026-03-05':'559','12-1-2026-03-06':'559',
  '13-1-2026-03-10':'564','13-1-2026-03-11':'564','13-1-2026-03-20':'571','13-1-2026-03-21':'571',
};

const _now = new Date();
let viewYear = 2026;
let viewMonth = 2; // March

const UA_MONTHS = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const DOW_UA = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];

function prevMonth() { viewMonth--; if (viewMonth<0){viewMonth=11;viewYear--;} renderSchedule(); }
function nextMonth() { viewMonth++; if (viewMonth>11){viewMonth=0;viewYear++;} renderSchedule(); }
function goToday() { viewYear = _now.getFullYear(); viewMonth = _now.getMonth(); renderSchedule(); }

function dateStr(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

let depLookup = new Set();
function buildDepLookup() {
  const s = new Set();
  departures.forEach(dep => {
    const start = new Date(dep.startDate + 'T00:00:00');
    const end = new Date((dep.endDate || dep.startDate) + 'T00:00:00');
    for (const d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
      const iso = d.toISOString().slice(0,10);
      s.add(`${dep.vehicleId}-${dep.driverId}-${iso}`);
    }
  });
  return s;
}

function cellClass(vid, slot, drId, iso, value, isInactive, isWeekend, isToday) {
  if (isInactive) return 'dc inactive';
  const val = (value || '').toUpperCase();
  let cls = 'dc';
  if (val === 'ВР') cls += ' vr';
  else if (depLookup.has(`${vid}-${drId}-${iso}`)) cls += ' dep';
  if (isWeekend) cls += ' weekend';
  if (isToday) cls += ' today';
  return cls;
}

function renderSchedule() {
  depLookup = buildDepLookup();
  document.getElementById('month-label').textContent = `${UA_MONTHS[viewMonth]} ${viewYear}`;
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const todayIso = _now.toISOString().slice(0,10);
  const todayDay = (_now.getFullYear() === viewYear && _now.getMonth() === viewMonth) ? _now.getDate() : -1;
  const table = document.getElementById('sched-table');

  let thead = '<thead><tr>';
  thead += '<th class="cv">Авто</th><th class="cd">Водій</th>';
  for (let d = 1; d <= 31; d++) {
    if (d > daysInMonth) { thead += '<th class="dh inactive" style="background:#f1f5f9"></th>'; continue; }
    const dow = new Date(viewYear, viewMonth, d).getDay();
    const we = dow === 0 || dow === 6;
    const is_today = d === todayDay;
    thead += `<th class="dh${we ? ' weekend' : ''}${is_today ? ' today' : ''}">${d}<span class="dow">${DOW_UA[dow]}</span></th>`;
  }
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  vehicles.forEach((v, vi) => {
    const isFirst = vi === 0;
    // Row 1 — Driver 1
    tbody += `<tr class="${isFirst ? 'row1-first' : 'row1'}">`;
    tbody += `<td class="cv" rowspan="3"><span class="v-idx">${v.index}</span><span class="v-name">${v.name}</span></td>`;
    tbody += `<td class="cd">${v.driver1 ? v.driver1.name : '<span style="color:var(--text-light)">—</span>'}</td>`;
    for (let d = 1; d <= 31; d++) {
      if (d > daysInMonth) { tbody += '<td class="dc inactive"></td>'; continue; }
      const iso = dateStr(viewYear, viewMonth, d);
      const key = `${v.id}-1-${iso}`;
      const val = scheduleData[key] || '';
      const drId = v.driver1 ? v.driver1.id : -1;
      const dow = new Date(viewYear, viewMonth, d).getDay();
      const cls = cellClass(v.id, 1, drId, iso, val, false, dow === 0 || dow === 6, d === todayDay);
      tbody += `<td class="${cls}" data-key="${key}" onclick="handleCellClick(this)">${val}</td>`;
    }
    tbody += '</tr>';

    // Row 2 — Driver 2
    tbody += '<tr>';
    tbody += `<td class="cd">${v.driver2 ? v.driver2.name : '<span style="color:var(--text-light)">—</span>'}</td>`;
    for (let d = 1; d <= 31; d++) {
      if (d > daysInMonth) { tbody += '<td class="dc inactive"></td>'; continue; }
      const iso = dateStr(viewYear, viewMonth, d);
      const key = `${v.id}-2-${iso}`;
      const val = scheduleData[key] || '';
      const drId = v.driver2 ? v.driver2.id : -1;
      const dow = new Date(viewYear, viewMonth, d).getDay();
      const cls = cellClass(v.id, 2, drId, iso, val, false, dow === 0 || dow === 6, d === todayDay);
      tbody += `<td class="${cls}" data-key="${key}" onclick="handleCellClick(this)">${val}</td>`;
    }
    tbody += '</tr>';

    // Row 3 — Route code (auto)
    tbody += '<tr>';
    tbody += '<td class="cr-label">Маршрут</td>';
    for (let d = 1; d <= 31; d++) {
      if (d > daysInMonth) { tbody += '<td class="cr inactive"></td>'; continue; }
      const iso = dateStr(viewYear, viewMonth, d);
      const code = getRouteCode(v.id, iso);
      tbody += `<td class="cr">${code}</td>`;
    }
    tbody += '</tr>';
  });
  tbody += '</tbody>';
  table.innerHTML = thead + tbody;
}

function handleCellClick(cell) {
  if (cell.classList.contains('inactive') || cell.classList.contains('editing')) return;
  startEdit(cell);
}

function startEdit(cell) {
  const key = cell.dataset.key;
  const prev = scheduleData[key] || '';
  cell.classList.add('editing');
  cell.innerHTML = '';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = prev;
  inp.maxLength = 6;
  cell.appendChild(inp);
  inp.focus();
  inp.select();

  let saved = false;
  const save = () => {
    if (saved) return; saved = true;
    const val = inp.value.trim().toUpperCase();
    if (val) scheduleData[key] = val; else delete scheduleData[key];
    refreshCell(cell, key);
  };
  const cancel = () => { if (saved) return; saved = true; refreshCell(cell, key); };

  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.removeEventListener('blur', save); cancel(); }
    if (e.key === 'Tab') {
      e.preventDefault();
      inp.removeEventListener('blur', save);
      save();
      const row = cell.closest('tr');
      const cells = [...row.querySelectorAll('.dc:not(.inactive)')];
      const idx = cells.indexOf(cell);
      const nextIdx = e.shiftKey ? idx - 1 : idx + 1;
      if (nextIdx >= 0 && nextIdx < cells.length) startEdit(cells[nextIdx]);
    }
  });
}

function refreshCell(cell, key) {
  cell.classList.remove('editing');
  const val = scheduleData[key] || '';
  cell.textContent = val;
  const parts = key.split('-');
  const vid = parseInt(parts[0]), slot = parseInt(parts[1]);
  const iso = parts.slice(2).join('-');
  const v = vehicles.find(v => v.id === vid);
  const driver = slot === 1 ? v?.driver1 : v?.driver2;
  const drId = driver ? driver.id : -1;
  const [yy,mm,dd] = iso.split('-').map(Number);
  const dow = new Date(yy, mm-1, dd).getDay();
  const todayIso = _now.toISOString().slice(0,10);
  cell.className = cellClass(vid, slot, drId, iso, val, false, dow === 0 || dow === 6, iso === todayIso);
  cell.setAttribute('onclick', 'handleCellClick(this)');
}

renderSchedule();
</script>
