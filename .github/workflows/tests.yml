name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands.
# github.ref is a sanitized ref name (refs/heads/foo) — safe in expressions.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Backend pure-logic (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v

  playwright:
    name: Integration + UI (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Create CI .env
        run: |
          cat > .env <<'EOF'
          FRONTEND_PORT=3000
          VITE_BASE_URL=/
          POSTGRES_USER=comnet
          POSTGRES_PASSWORD=comnet_ci
          POSTGRES_DB=comnet
          DATABASE_URL=postgresql://comnet:comnet_ci@postgres:5432/comnet
          SECRET_KEY=ci-secret-only-for-ci
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=480
          FIRST_ADMIN_USERNAME=admin
          FIRST_ADMIN_PASSWORD=admin123
          TEST_USER=admin
          TEST_PASS=admin123
          EOF

      - name: Run Playwright suite
        run: docker compose --profile test up --build playwright --abort-on-container-exit

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs backend | tail -200

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/results/
          retention-days: 14

      - name: Upload test-results (screenshots/videos on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/e2e/test-results/
          retention-days: 14
